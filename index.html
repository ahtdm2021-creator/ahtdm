<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة البحث بالسجل المدني</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; text-align: center; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 85%; padding: 12px; margin-bottom: 20px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        button { padding: 12px 25px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 90%; }
        button:hover { background-color: #218838; }
        #result { margin-top: 30px; text-align: right; padding: 15px; border-top: 2px solid #eee; display: none; }
        .error { color: red; font-weight: bold; }
        .loading { color: #007bff; font-weight: bold; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #f0f0f0; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام البحث بالسجل المدني</h2>
    <p>أدخل رقم السجل المدني المراد الاستعلام عنه:</p>
    <input type="text" id="idInput" placeholder="أدخل رقم السجل هنا...">
    <br>
    <button onclick="searchData()">بحث في السجلات</button>

    <div id="result"></div>
</div>

<script>
    // الرابط المطور لجلب البيانات كـ JSON وتخطي حجب الحماية
    const spreadsheetId = '1s05TaJQyxKAXdcDPpf5SYdUDNDsuYT2dxIB0K5l4lm0';
    const jsonUrl = `https://google.com{spreadsheetId}/gviz/tq?tqx=out:json`;

    async function searchData() {
        const searchId = document.getElementById('idInput').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!searchId) {
            alert('الرجاء إدخال رقم السجل المدني');
            return;
        }

        resultDiv.innerHTML = '<p class="loading">جاري جلب البيانات والبحث فوراً...</p>';
        resultDiv.style.display = 'block';

        try {
            const response = await fetch(jsonUrl);
            if (!response.ok) throw new Error('تعذر الوصول للملف');
            
            const text = await response.text();
            
            // تنظيف استجابة جوجل وتحويلها إلى كائن JSON حقيقي
            const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
            const data = JSON.parse(jsonString);
            
            const rows = data.table.rows;
            const cols = data.table.cols;

            // استخراج أسماء الأعمدة (العناوين)
            const headers = cols.map((col, idx) => col.label || `العامود ${idx + 1}`);
            
            let foundRow = null;

            // البحث داخل الصفوف
            for (let row of rows) {
                let matchFound = false;
                let cellValues = row.c.map(cell => cell && cell.v !== null ? String(cell.v).trim() : '');

                // التحقق من مطابقة الرقم المدخل في أي خلية من هذا الصف
                if (cellValues.some(val => val === searchId)) {
                    foundRow = cellValues;
                    break;
                }
            }

            if (foundRow) {
                let htmlContent = '<h3>نتائج البحث:</h3><ul>';
                headers.forEach((header, index) => {
                    if(foundRow[index] !== undefined && foundRow[index] !== "") {
                        htmlContent += `<li><strong>${header}:</strong> ${foundRow[index]}</li>`;
                    }
                });
                htmlContent += '</ul>';
                resultDiv.innerHTML = htmlContent;
            } else {
                resultDiv.innerHTML = '<p class="error">عذراً، لم يتم العثور على هذا السجل المدني في النظام.</p>';
            }

        } catch (error) {
            console.error(error);
            resultDiv.innerHTML = '<p class="error">حدث خطأ أثناء جلب البيانات.<br>تأكد أن ملف الشيت متاح "لأي شخص لديه الرابط" كعارض.</p>';
        }
    }
</script>

</body>
</html>
