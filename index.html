<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة البحث بالسجل المدني</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; text-align: center; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; margin-bottom: 20px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #result { margin-top: 30px; text-align: right; padding: 15px; border-top: 2px solid #eee; display: none; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام البحث بالسجل المدني</h2>
    <p>أدخل رقم السجل المدني المراد الاستعلام عنه:</p>
    <input type="text" id="idInput" placeholder="مثال: 1023456789">
    <br>
    <button onclick="searchData()">بحث</button>

    <div id="result"></div>
</div>

<script>
    // رابط ملف قوقل شيت الخاص بك بصيغة CSV
    const sheetUrl = 'https://google.com';

    async function searchData() {
        const searchId = document.getElementById('idInput').value.trim();
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';

        if (!searchId) {
            alert('الرجاء إدخال رقم السجل المدني');
            return;
        }

        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            
            // تحويل بيانات CSV إلى مصفوفة
            const rows = data.split('\n').map(row => row.split(','));
            const headers = rows[0].map(h => h.trim());
            
            // البحث عن السجل المدني (نفترض أنه في العمود الأول أو يتم مطابقتة في أي عمود)
            let foundRow = null;
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].some(cell => cell.trim() === searchId)) {
                    foundRow = rows[i];
                    break;
                }
            }

            resultDiv.style.display = 'block';
            if (foundRow) {
                let htmlContent = '<h3>نتائج البحث:</h3><ul>';
                headers.forEach((header, index) => {
                    if(foundRow[index]) {
                        htmlContent += `<li><strong>${header}:</strong> ${foundRow[index].trim()}</li>`;
                    }
                });
                htmlContent += '</ul>';
                resultDiv.innerHTML = htmlContent;
            } else {
                resultDiv.innerHTML = '<p class="error">عذراً، لم يتم العثور على هذا السجل المدني.</p>';
            }

        } catch (error) {
            console.error(error);
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p class="error">حدث خطأ أثناء جلب البيانات. تأكد من صلاحيات مشاركة الملف.</p>';
        }
    }
</script>

</body>
</html>
